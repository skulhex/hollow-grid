name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  server-checks:
    name: Server checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: server-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare image names
        id: images
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "server=ghcr.io/${repository}/server" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${repository}/web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Server metadata
        id: server-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.server }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: server
          file: server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Web metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.web }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
