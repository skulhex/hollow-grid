services:
  server:
    image: ${SERVER_IMAGE:-hollow-grid-server}
    build:
      context: ./server
    environment:
      HOST: 0.0.0.0
      PORT: 8787
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-hollow-grid-web}
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
    entrypoint: ["nginx", "-g", "daemon off;"]
    depends_on:
      - server
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    restart: unless-stopped
