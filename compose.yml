services:
  server:
    build:
      context: ./server
    environment:
      HOST: 0.0.0.0
      PORT: 8787
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped

  web:
    image: nginx:alpine
    entrypoint: ["nginx", "-g", "daemon off;"]
    depends_on:
      - server
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    volumes:
      - ./dist/web:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
